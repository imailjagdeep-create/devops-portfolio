apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-deployment
  labels:
    app: portfolio
spec:
  replicas: 2  # Exactly 2 replicas as required
  selector:
    matchLabels:
      app: portfolio
  strategy:
    type: RollingUpdate  # Rolling update strategy
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
      - name: portfolio
        image: YOUR_USERNAME/my-portfolio:v1  # Change YOUR_USERNAME
        ports:
        - containerPort: 80
        resources:  # Resource limits as required
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"